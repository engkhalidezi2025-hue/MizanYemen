<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميزان اليمن القضائي</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel (لتشغيل كود React داخل المتصفح مباشرة) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- FontAwesome (للأيقونات بدلاً من Lucide لسهولة التشغيل في ملف واحد) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- الخطوط -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; margin: 0; padding: 0;}
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- الإعدادات العامة ---
        const apiKey = ""; 
        const GEMINI_MODEL = "gemini-2.5-flash-preview-09-2025";

        const MizanYemenApp = () => {
          // --- المراجع (Refs) ---
          const fileInputRef = useRef(null);
          const chatEndRef = useRef(null);

          // --- حالة النظام والمصادقة ---
          const [user, setUser] = useState(null);
          const [loginData, setLoginData] = useState({ username: '', password: '' });
          const [activeModule, setActiveModule] = useState('dashboard');
          const [isSidebarOpen, setIsSidebarOpen] = useState(true);
          const [notification, setNotification] = useState(null);
          const [isProcessingFile, setIsProcessingFile] = useState(false);

          // --- إدارة البيانات ---
          const [allUsers, setAllUsers] = useState(() => {
            const saved = localStorage.getItem('mizan_users_v6');
            return saved ? JSON.parse(saved) : [
              { id: 'admin_1', username: 'khalid2025', password: 'khalid2025', role: 'admin', email: 'admin@mizan.ye', status: 'active', joinedAt: new Date().toISOString() }
            ];
          });

          const [savedChats, setSavedChats] = useState(() => {
            const saved = localStorage.getItem('mizan_chats_v6');
            return saved ? JSON.parse(saved) : {};
          });

          const [chatMessages, setChatMessages] = useState([]);
          const [chatInput, setChatInput] = useState('');
          const [isChatLoading, setIsChatLoading] = useState(false);

          // تحديث التخزين عند التغيير
          useEffect(() => { localStorage.setItem('mizan_users_v6', JSON.stringify(allUsers)); }, [allUsers]);
          useEffect(() => { localStorage.setItem('mizan_chats_v6', JSON.stringify(savedChats)); }, [savedChats]);
          useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [chatMessages]);

          // ==========================================
          // هندسة الأوامر (Prompt Architecture) - بناءً على الملف المرفق
          // ==========================================
          const SYSTEM_CORE = `أنت "المستشار القضائي اليمني الذكي الشامل".
          هويتك: أنت نظام ذكاء قضائي احترافي متخصص حصرياً في القضاء اليمني بجميع فروعه وإجراءاته وتطبيقاته العملية. 
          أنت تعمل كمساعد وخبير ومستشار ومحرر ومراجع ومحلل ومحقق وثائق لكل من له صلة بالقضاء اليمني.
          الاختصاص الحصري: اعمل فقط ضمن القضاء اليمني. ممنوع منعاً باتاً استخدام أي نظام قانوني أجنبي أو دولي في استنتاجاتك، ومرجعيتك الوحيدة هي قوانين الجمهورية اليمنية، وإجراءات التقاضي أمام المحاكم اليمنية.`;

          const SYSTEM_IDENTITIES = {
            consultant: `${SYSTEM_CORE}
            دورك الحالي: (القاضي المستشار / الخبير القانوني). 
            مهمتك: تقديم استشارات دقيقة ومفصلة. إذا سُئلت، يجب أن تفصل الإجابة وتربطها بالمواد القانونية اليمنية المناسبة، مع بيان التطبيق العملي داخل المحاكم.`,
            
            case_analyzer: `${SYSTEM_CORE}
            دورك الحالي: (محلل القضايا - Case Analysis Engine). 
            مهمتك: تحليل وقائع النزاع، تحديد التكييف القانوني الصحيح وفق القانون اليمني، بيان نقاط القوة والضعف، استخراج الثغرات، واقتراح خطة عمل قضائية متكاملة لحل النزاع.`,
            
            drafter: `${SYSTEM_CORE}
            دورك الحالي: (محرر وصائغ الأعمال القضائية - Drafting Engine).
            مهمتك: صياغة (صحائف دعوى، مذكرات دفاع، دفوع، طلبات) بلغة قانونية يمنية رصينة ومطابقة للشكل الإجرائي المطلوب في قانون المرافعات اليمني. يجب أن تكون الصياغة جاهزة للطباعة والتقديم للمحكمة.`,

            judgment_analyzer: `${SYSTEM_CORE}
            دورك الحالي: (محلل الأحكام القضائية). 
            مهمتك: تفكيك الحكم إلى (الوقائع، الأسباب، المنطوق). بيان مدى موافقته للقانون اليمني، تحديد نقاط القوة والضعف في التسبيب، واستخراج أسباب ومطاعن الاستئناف أو النقض الممكنة.`,
            
            doc_analyzer: `${SYSTEM_CORE}
            دورك الحالي: (محقق وثائق ومخطوطات شرعية وقانونية). 
            مهمتك: قراءة البصائر، العقود، والوكالات. تفريغ محتواها، شرح المصطلحات العرفية اليمنية القديمة، وبيان صحتها الشكلية ونواقصها.`,
            
            validity_checker: `${SYSTEM_CORE}
            دورك الحالي: (خبير حجية وإثبات). 
            مهمتك: تقييم القوة الثبوتية للأدلة والمستندات المعروضة عليك وفقاً لنصوص "قانون الإثبات اليمني" حصراً، وبيان ما يقويها أو يطعن فيها.`
          };

          const showNotification = (msg, type = 'success') => {
            setNotification({ msg, type });
            setTimeout(() => setNotification(null), 3000);
          };

          const exportChat = () => {
            if (!chatMessages || chatMessages.length === 0) return;
            const content = chatMessages.map(m => `${m.role === 'user' ? 'السائل' : 'النظام'}: ${m.content}`).join('\n\n');
            const blob = new Blob([`ميزان اليمن - وحدة ${activeModule}\nالمستخدم: ${user.username}\n\n${content}`], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `ميزان_اليمن_${activeModule}_${Date.now()}.txt`;
            link.click();
            showNotification("تم تصدير السجل كملف قابل للحفظ (Archiving Layer)");
          };

          // --- معالجة الدخول والخروج ---
          const handleLogin = (e) => {
            e.preventDefault();
            const foundUser = allUsers.find(u => u.username === loginData.username && u.password === loginData.password);
            if (foundUser) {
              if (foundUser.status === 'blocked') {
                showNotification("عذراً، هذا الحساب تم إغلاقه من قبل المشرف.", "error");
                return;
              }
              setUser(foundUser);
              setChatMessages(savedChats[foundUser.id] || [{ role: 'system', content: `مرحباً بك سيادة المستشار ${foundUser.username} في ميزان اليمن القضائي.` }]);
              showNotification(`تم تسجيل الدخول بنجاح`);
            } else {
              showNotification("خطأ في البيانات", "error");
            }
          };

          const handleLogout = () => {
            if (user) setSavedChats(prev => ({ ...prev, [user.id]: chatMessages }));
            setUser(null);
            setLoginData({ username: '', password: '' });
            setActiveModule('dashboard');
          };

          // --- إدارة الوحدات ---
          const switchModule = (moduleId) => {
            if (user && chatMessages.length > 1) {
              setSavedChats(prev => ({ ...prev, [user.id]: chatMessages }));
            }
            setActiveModule(moduleId);
            const welcomeText = {
              dashboard: "مرحباً بك.",
              consultant: "وحدة الاستشارات القضائية (القاضي المستشار) جاهزة.",
              case_analyzer: "وحدة تحليل القضايا (Case Analysis Engine) مفعلة. زودني بوقائع النزاع.",
              drafter: "محرر الأعمال القضائية (Drafting Engine) جاهز. ما هي المذكرة أو الصحيفة المطلوب صياغتها؟",
              judgment_analyzer: "محلل الأحكام جاهز. ارفع نص الحكم لبيان أسبابه ومنطوقه وفرص الطعن فيه.",
              doc_analyzer: "محقق الوثائق (البصائر والعقود) مفعل. ارفع الوثيقة للتفريغ والتحليل.",
              validity_checker: "خبير الإثبات والحجية جاهز. اعرض دليلك لتقييمه وفق قانون الإثبات اليمني."
            }[moduleId] || "مرحباً.";
            setChatMessages([{ role: 'system', content: welcomeText }]);
          };

          // --- إرسال الرسائل ---
          const handleSendMessage = async (customInput = null) => {
            const input = customInput || chatInput;
            if (!input.trim() || isChatLoading) return;

            if (!customInput) {
              const userMsg = { role: 'user', content: input };
              setChatMessages(prev => [...prev, userMsg]);
              setChatInput('');
            }
            
            setIsChatLoading(true);

            try {
              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: input }] }],
                  systemInstruction: { parts: [{ text: SYSTEM_IDENTITIES[activeModule] || SYSTEM_IDENTITIES.consultant }] }
                })
              });
              const data = await response.json();
              const aiResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || "المحرك القضائي لا يستجيب حالياً، يرجى المحاولة لاحقاً.";
              setChatMessages(prev => [...prev, { role: 'system', content: aiResponse }]);
            } catch (e) {
              showNotification("خطأ في الاتصال بالخادم الذكي", "error");
              console.error(e);
            } finally {
              setIsChatLoading(false);
            }
          };

          // --- معالجة رفع الملفات وإرسالها فوراً للتحليل ---
          const handleFileUpload = async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            setIsProcessingFile(true);
            showNotification("جاري رفع وتحليل الوثيقة...");

            const reader = new FileReader();
            reader.onloadend = async () => {
              const base64Data = reader.result.split(',')[1];
              try {
                const filePrompt = `[تم إرفاق ملف: ${file.name}]\nبصفتك الذكاء القضائي اليمني، قم فوراً باستخراج محتوى هذا الملف، تحليله، وتقييمه وفق القوانين اليمنية ذات الصلة، وقدم مخرجاً منظماً (كتقرير إثبات أو تفريغ وثيقة أو تحليل حكم) بحسب محتوى المرفق.`;
                
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    contents: [
                      { 
                        parts: [
                          { text: filePrompt }, 
                          { inlineData: { mimeType: file.type, data: base64Data } }
                        ] 
                      }
                    ],
                    systemInstruction: { parts: [{ text: SYSTEM_IDENTITIES[activeModule] }] }
                  })
                });

                const data = await response.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text;

                if (text) {
                  setChatMessages(prev => [...prev, { role: 'user', content: `[تم إرفاق ملف: ${file.name}]` }]);
                  setChatMessages(prev => [...prev, { role: 'system', content: text }]);
                  showNotification("تم معالجة الملف واستخراج التقرير بنجاح");
                } else {
                  showNotification("فشل تحليل محتوى الملف", "error");
                }
              } catch (e) { 
                showNotification("حدث خطأ أثناء الاتصال بالمحلل الذكي", "error"); 
              } finally {
                setIsProcessingFile(false);
                if (fileInputRef.current) fileInputRef.current.value = ''; 
              }
            };
            reader.readAsDataURL(file);
          };

          const menuItems = [
            { id: 'dashboard', name: 'الرئيسية', icon: 'fas fa-scale-balanced' },
            { id: 'consultant', name: 'المستشار القضائي', icon: 'fas fa-comments' },
            { id: 'case_analyzer', name: 'محلل القضايا', icon: 'fas fa-briefcase' },
            { id: 'drafter', name: 'صياغة المذكرات', icon: 'fas fa-pen-nib' },
            { id: 'judgment_analyzer', name: 'محلل الأحكام', icon: 'fas fa-gavel' },
            { id: 'doc_analyzer', name: 'محلل الوثائق', icon: 'fas fa-file-alt' },
            { id: 'validity_checker', name: 'فاحص الحجية', icon: 'fas fa-fingerprint' },
            { id: 'admin', name: 'إدارة النظام', icon: 'fas fa-users', adminOnly: true },
            { id: 'settings', name: 'المزامنة', icon: 'fas fa-cloud' },
          ];

          if (!user) {
            return (
              <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center p-6" dir="rtl">
                <div className="w-full max-w-md bg-white rounded-[40px] p-10 shadow-2xl relative">
                  <div className="text-center mb-10">
                    <div className="w-20 h-20 bg-amber-600 rounded-3xl flex items-center justify-center text-white mx-auto mb-4 shadow-xl">
                      <i className="fas fa-scale-balanced text-4xl"></i>
                    </div>
                    <h1 className="text-3xl font-black text-slate-900">ميزان اليمن</h1>
                    <p className="text-slate-400 font-bold mt-1 text-sm">المحرك القضائي الذكي الشامل</p>
                  </div>
                  <form onSubmit={handleLogin} className="space-y-4">
                    <input type="text" value={loginData.username} onChange={e=>setLoginData({...loginData, username: e.target.value})} className="w-full px-6 py-4 bg-slate-50 border-2 rounded-2xl outline-none focus:border-amber-500 font-bold" placeholder="اسم المستخدم" required />
                    <input type="password" value={loginData.password} onChange={e=>setLoginData({...loginData, password: e.target.value})} className="w-full px-6 py-4 bg-slate-50 border-2 rounded-2xl outline-none focus:border-amber-500 font-bold" placeholder="كلمة المرور" required />
                    <button className="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-lg hover:bg-black shadow-lg">دخول النظام</button>
                  </form>
                  
                  <div className="mt-12 pt-8 border-t border-slate-100">
                     <div className="flex flex-col gap-4 text-center">
                        <div>
                           <p className="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-1">فكرة وإشراف</p>
                           <p className="text-slate-800 font-black text-sm italic">القاضي / خالد عبدالنور البركاني</p>
                        </div>
                        <div className="grid grid-cols-3 gap-2 mt-2">
                           <div className="bg-slate-50 p-2 rounded-xl border border-slate-100">
                              <p className="text-[9px] text-amber-600 font-black mb-0.5">إعداد وبرمجة</p>
                              <p className="text-slate-700 font-black text-[11px]">م. أمير البريهي</p>
                           </div>
                           <div className="bg-slate-50 p-2 rounded-xl border border-slate-100">
                              <p className="text-[9px] text-amber-600 font-black mb-0.5">إعداد وبرمجة</p>
                              <p className="text-slate-700 font-black text-[11px]">م. خالد العزي</p>
                           </div>
                           <div className="bg-slate-50 p-2 rounded-xl border border-slate-100">
                              <p className="text-[9px] text-amber-600 font-black mb-0.5">إعداد وبرمجة</p>
                              <p className="text-slate-700 font-black text-[11px]">م. وسام محي الدين</p>
                           </div>
                        </div>
                     </div>
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className="flex h-screen bg-slate-50 text-slate-900 font-sans overflow-hidden" dir="rtl">
              {notification && (
                <div className={`fixed top-6 left-1/2 -translate-x-1/2 z-[100] px-8 py-4 rounded-2xl shadow-2xl flex items-center gap-4 animate-in ${notification.type === 'error' ? 'bg-red-600 text-white' : 'bg-slate-900 text-white'}`}>
                  {notification.type === 'error' ? <i className="fas fa-exclamation-triangle text-2xl"></i> : <i className="fas fa-check-circle text-2xl text-amber-500"></i>}
                  <span className="font-bold">{notification.msg}</span>
                </div>
              )}

              {/* Sidebar */}
              <aside className={`${isSidebarOpen ? 'w-72' : 'w-24'} bg-slate-900 transition-all duration-300 flex flex-col shrink-0 z-30`}>
                <div className="h-24 flex items-center justify-between px-6 bg-black/10">
                   <i className="fas fa-scale-balanced text-3xl text-amber-500 mx-auto"></i>
                </div>
                <nav className="flex-1 overflow-y-auto px-4 py-6 space-y-1">
                  {menuItems.map(item => {
                    if (item.adminOnly && user.role !== 'admin') return null;
                    const active = activeModule === item.id;
                    return (
                      <button key={item.id} onClick={() => switchModule(item.id)} className={`w-full flex items-center gap-4 px-4 py-3.5 rounded-xl transition-all font-bold ${active ? 'bg-amber-600 text-white' : 'text-slate-400 hover:bg-white/5'}`}>
                        <i className={`${item.icon} text-xl w-6 text-center`}></i>
                        {isSidebarOpen && <span className="text-sm">{item.name}</span>}
                      </button>
                    );
                  })}
                </nav>
                <div className="p-4 border-t border-white/5">
                  <button onClick={handleLogout} className="w-full flex items-center gap-4 px-4 py-3.5 text-red-400 hover:bg-red-500/10 rounded-xl transition-all font-bold">
                    <i className="fas fa-sign-out-alt text-xl w-6 text-center"></i>
                    {isSidebarOpen && <span className="text-sm">خروج</span>}
                  </button>
                </div>
              </aside>

              {/* Main Content */}
              <main className="flex-1 flex flex-col min-w-0 overflow-hidden">
                <header className="h-24 bg-white border-b flex items-center justify-between px-10 shrink-0">
                  <div>
                    <h1 className="font-black text-xl text-slate-800">{menuItems.find(m => m.id === activeModule)?.name}</h1>
                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Mizan Yemen Judicial Platform</p>
                  </div>
                  <div className="flex items-center gap-4">
                     <div className="text-left hidden md:block border-l pl-4">
                        <p className="text-[10px] text-amber-600 font-black">المستخدم</p>
                        <p className="font-black text-slate-800">{user.username}</p>
                     </div>
                     <div className="w-10 h-10 bg-amber-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i className="fas fa-user text-xl"></i></div>
                  </div>
                </header>

                <div className="flex-1 overflow-y-auto p-6 md:p-8">
                  {activeModule === 'dashboard' && (
                    <div className="max-w-5xl mx-auto space-y-12">
                      <div className="bg-slate-900 rounded-[48px] p-16 text-white text-center shadow-2xl relative border-2 border-amber-500/10">
                         <i className="fas fa-scale-balanced text-7xl text-amber-500 mx-auto mb-8 block"></i>
                         <h1 className="text-5xl font-black mb-4">ميزان اليمن القضائي</h1>
                         <p className="text-amber-400 font-bold mb-10 text-xl">منصة ذكاء قضائية يمنية متكاملة</p>
                         
                         <div className="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-3xl mx-auto">
                            {menuItems.filter(i => !['dashboard', 'admin', 'settings'].includes(i.id)).map(m => (
                              <button key={m.id} onClick={()=>switchModule(m.id)} className="bg-white/5 border border-white/10 p-5 rounded-3xl hover:bg-amber-600 transition-all group">
                                 <div className="mb-3 flex justify-center"><i className={`${m.icon} text-2xl`}></i></div>
                                 <p className="text-xs font-black">{m.name}</p>
                              </button>
                            ))}
                         </div>

                         <div className="mt-16 pt-8 border-t border-white/10 flex flex-wrap justify-center gap-12">
                            <div className="flex items-center gap-3">
                               <div className="p-3 bg-amber-600/20 rounded-lg text-amber-500"><i className="fas fa-gavel"></i></div>
                               <div className="text-right">
                                  <p className="text-[10px] font-black text-amber-500">فكرة وإشراف</p>
                                  <p className="font-black text-sm">القاضي خالد عبدالنور البركاني</p>
                               </div>
                            </div>
                            <div className="flex items-center gap-3">
                               <div className="p-3 bg-blue-600/20 rounded-lg text-blue-500"><i className="fas fa-code"></i></div>
                               <div className="text-right">
                                  <p className="text-[10px] font-black text-blue-500">إعداد وبرمجة</p>
                                  <p className="font-black text-sm">م. أمير البريهي</p>
                               </div>
                            </div>
                            <div className="flex items-center gap-3">
                               <div className="p-3 bg-purple-600/20 rounded-lg text-purple-500"><i className="fas fa-laptop-code"></i></div>
                               <div className="text-right">
                                  <p className="text-[10px] font-black text-purple-500">إعداد وبرمجة</p>
                                  <p className="font-black text-sm">م. خالد العزي</p>
                               </div>
                            </div>
                            <div className="flex items-center gap-3">
                               <div className="p-3 bg-green-600/20 rounded-lg text-green-500"><i className="fas fa-code-branch"></i></div>
                               <div className="text-right">
                                  <p className="text-[10px] font-black text-green-500">إعداد وبرمجة</p>
                                  <p className="font-black text-sm">م. وسام محي الدين</p>
                               </div>
                            </div>
                         </div>
                      </div>
                    </div>
                  )}

                  {['consultant', 'case_analyzer', 'drafter', 'judgment_analyzer', 'doc_analyzer', 'validity_checker'].includes(activeModule) && (
                    <div className="h-full flex flex-col max-w-5xl mx-auto">
                       <div className="flex-1 overflow-y-auto bg-white rounded-[32px] border p-8 space-y-6 shadow-sm mb-6">
                          {chatMessages.map((m, i) => (
                            <div key={i} className={`flex gap-5 ${m.role === 'user' ? 'flex-row-reverse' : ''}`}>
                              <div className={`w-12 h-12 rounded-2xl flex items-center justify-center shrink-0 shadow-lg ${m.role === 'user' ? 'bg-slate-800 text-white' : 'bg-amber-600 text-white'}`}>
                                {m.role === 'user' ? <i className="fas fa-user text-xl"></i> : <i className="fas fa-scale-balanced text-xl"></i>}
                              </div>
                              <div className={`max-w-[80%] p-6 rounded-[28px] leading-relaxed font-medium ${m.role === 'user' ? 'bg-slate-900 text-white rounded-tr-none' : 'bg-slate-50 border text-slate-800 rounded-tl-none'}`}>
                                <div className="whitespace-pre-wrap text-base">{m.content}</div>
                              </div>
                            </div>
                          ))}
                          {(isChatLoading || isProcessingFile) && (
                            <div className="flex gap-5 animate-pulse">
                              <div className="w-12 h-12 bg-amber-100 rounded-2xl flex items-center justify-center"><i className="fas fa-spinner fa-spin text-amber-600 text-xl"></i></div>
                              <div className="bg-slate-50 h-20 w-1/2 rounded-3xl p-6 flex items-center text-slate-400 font-bold italic">جاري التفكير والتحليل القانوني...</div>
                            </div>
                          )}
                          <div ref={chatEndRef} />
                       </div>

                       <div className="bg-white p-4 rounded-[32px] border-2 flex gap-4 items-center shadow-xl focus-within:border-amber-500 transition-all">
                          <button 
                            onClick={()=>fileInputRef.current?.click()} 
                            disabled={isProcessingFile || isChatLoading} 
                            className={`p-4 rounded-2xl transition-all ${isProcessingFile ? 'bg-amber-100 text-amber-600' : 'bg-slate-50 text-slate-400 hover:bg-slate-100'}`}
                          >
                            {isProcessingFile ? <i className="fas fa-spinner fa-spin text-xl"></i> : <i className="fas fa-upload text-xl"></i>}
                          </button>
                          <input 
                            value={chatInput} 
                            onChange={e=>setChatInput(e.target.value)} 
                            onKeyPress={e=>e.key === 'Enter' && handleSendMessage()} 
                            className="flex-1 outline-none font-bold text-xl px-4 bg-transparent" 
                            placeholder={isProcessingFile ? "جاري معالجة الملف..." : "اكتب تفاصيل الطلب، القضية، أو أمر الصياغة..."}
                            disabled={isChatLoading || isProcessingFile}
                          />
                          <button 
                            onClick={()=>handleSendMessage()} 
                            disabled={isChatLoading || isProcessingFile || !chatInput.trim()}
                            className={`p-5 rounded-[24px] shadow-xl transition-all ${(!chatInput.trim() || isChatLoading) ? 'bg-slate-200 text-slate-400' : 'bg-amber-600 text-white hover:bg-amber-700'}`}
                          >
                            <i className="fas fa-paper-plane text-xl rtl:-scale-x-100 block"></i>
                          </button>
                          <button onClick={exportChat} className="p-4 text-slate-300 hover:text-amber-600"><i className="fas fa-download text-xl"></i></button>
                       </div>
                       <input type="file" ref={fileInputRef} className="hidden" accept="image/*,application/pdf" onChange={handleFileUpload} />
                    </div>
                  )}

                  {activeModule === 'admin' && user.role === 'admin' && (
                     <div className="max-w-4xl mx-auto space-y-10">
                        <div className="bg-white p-10 rounded-[40px] border shadow-sm">
                           <h2 className="text-2xl font-black mb-8">لوحة إدارة المستخدمين</h2>
                           <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                              <input placeholder="اسم المستخدم" className="px-6 py-4 rounded-2xl border-2 bg-slate-50 outline-none" id="adm_user" />
                              <input type="password" placeholder="كلمة المرور" className="px-6 py-4 rounded-2xl border-2 bg-slate-50 outline-none" id="adm_pass" />
                              <button onClick={() => {
                                const u = document.getElementById('adm_user').value;
                                const p = document.getElementById('adm_pass').value;
                                if(u && p) {
                                  setAllUsers(prev => [...prev, {id: Date.now(), username: u, password: p, role: 'user', status: 'active', joinedAt: new Date().toISOString()}]);
                                  showNotification("تم إنشاء الحساب");
                                  document.getElementById('adm_user').value = '';
                                  document.getElementById('adm_pass').value = '';
                                }
                              }} className="bg-amber-600 text-white font-black rounded-2xl hover:bg-amber-700 shadow-lg">إضافة مستخدم</button>
                           </div>
                        </div>

                        <div className="bg-white p-10 rounded-[40px] border shadow-sm">
                           <div className="overflow-x-auto">
                              <table className="w-full text-right">
                                 <thead className="text-slate-400 border-b">
                                    <tr><th className="pb-6 uppercase text-[10px] font-black">المستخدم</th><th className="pb-6 uppercase text-[10px] font-black">الحالة</th><th className="pb-6 uppercase text-[10px] font-black">التحكم</th></tr>
                                 </thead>
                                 <tbody className="divide-y">
                                    {allUsers.map(u => (
                                      <tr key={u.id}>
                                        <td className="py-6 font-black">{u.username} {u.role === 'admin' && <span className="mr-2 text-purple-600 text-[10px]">مسؤول</span>}</td>
                                        <td className="py-6"><span className={`px-4 py-1.5 rounded-full text-[10px] font-black ${u.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>{u.status === 'active' ? 'نشط' : 'محظور'}</span></td>
                                        <td className="py-6">
                                           {u.username !== 'khalid2025' && (
                                             <div className="flex gap-2">
                                               <button onClick={()=>setAllUsers(prev=>prev.map(x=>x.id===u.id?{...x, status:x.status==='active'?'blocked':'active'}:x))} className="p-2 border rounded-xl w-10 h-10 flex items-center justify-center text-slate-600">{u.status==='active'?<i className="fas fa-lock"></i>:<i className="fas fa-unlock"></i>}</button>
                                               <button onClick={()=>setAllUsers(prev=>prev.filter(x=>x.id!==u.id))} className="p-2 border rounded-xl w-10 h-10 flex items-center justify-center text-red-500"><i className="fas fa-trash"></i></button>
                                             </div>
                                           )}
                                        </td>
                                      </tr>
                                    ))}
                                 </tbody>
                              </table>
                           </div>
                        </div>
                     </div>
                  )}

                  {activeModule === 'settings' && (
                    <div className="max-w-2xl mx-auto bg-white p-12 rounded-[48px] border shadow-sm text-center">
                       <i className="fas fa-cloud text-6xl text-amber-600 mx-auto mb-6 block"></i>
                       <h2 className="text-3xl font-black mb-4">المزامنة والبريد</h2>
                       <div className="space-y-6 text-right">
                          <input value={user.email || ''} onChange={e=>{
                            setAllUsers(prev => prev.map(u => u.id === user.id ? {...u, email: e.target.value} : u));
                            setUser({...user, email: e.target.value});
                          }} className="w-full px-6 py-5 bg-slate-50 border-2 rounded-3xl outline-none focus:border-amber-500 font-bold mt-2" placeholder="أدخل بريدك للمزامنة" />
                          <p className="text-sm font-bold text-slate-500 italic">يتم تخزين كافة البيانات حالياً بشكل محلي وآمن على جهازك.</p>
                       </div>
                    </div>
                  )}
                </div>
              </main>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MizanYemenApp />);
    </script>
</body>
</html>
